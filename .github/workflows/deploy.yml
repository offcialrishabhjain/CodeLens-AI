name: CodeLens AI - Auto Upload to S3
on:
  push:
    branches:
      - main  # This starts the upload every time you push code to 'main'

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Upload to S3
        run: |
          # This command syncs your files to your bucket
          aws s3 sync . s3://codelens-uploads-rishabh-2026 --exclude ".git/*" --exclude ".github/*"
