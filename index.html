<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeLens-AI | Smart Project Analysis</title>
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1610.0.min.js"></script>
    <style>
        /* Modernized UI Theme */
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: #f8fafc; }
        .container { background: #1e293b; padding: 2.5rem; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); text-align: center; width: 500px; border: 1px solid #334155; }
        h1 { color: #38bdf8; margin-bottom: 0.5rem; display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 2rem; }
        p { color: #94a3b8; margin-bottom: 2rem; }
        
        /* Upload Area Styling */
        .upload-area { border: 2px dashed #38bdf8; padding: 40px; border-radius: 12px; margin-bottom: 20px; background: #0f172a; transition: 0.3s ease; cursor: pointer; }
        .upload-area:hover { border-color: #7dd3fc; background: #1e293b; }
        input[type="file"] { color: #94a3b8; }

        button { background: #38bdf8; border: none; padding: 14px 20px; color: #0f172a; font-weight: 800; border-radius: 8px; cursor: pointer; width: 100%; font-size: 1.1rem; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { background: #7dd3fc; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(56, 189, 248, 0.4); }
        
        #status { margin-top: 20px; font-weight: 500; color: #38bdf8; font-size: 0.9rem; }

        /* Terminal-Style Result Box */
        #result-box { 
            margin-top: 25px; 
            padding: 20px; 
            background: #000000; 
            color: #10b981; /* Emerald Green */
            border-radius: 10px; 
            display: none; 
            text-align: left; 
            border: 1px solid #059669; 
            font-family: 'Fira Code', 'Courier New', monospace; 
            font-size: 0.85rem;
            line-height: 1.6;
            white-space: pre-wrap; /* Keeps the AI Mind Map structure */
            max-height: 450px;
            overflow-y: auto;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .loader { border: 4px solid #334155; border-top: 4px solid #38bdf8; border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; display: none; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .header-accent { color: #fbbf24; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔍 CodeLens<span class="header-accent">AI</span></h1>
    <p>Upload your repository to visualize architecture.</p>
    
    <div class="upload-area" onclick="document.getElementById('file-chooser').click()">
        <input type="file" id="file-chooser" style="display:none" onchange="updateFileName(this)"/>
        <div id="file-name-display">Drop ZIP here or Click to Browse</div>
    </div>
    
    <button id="upload-button">Execute Deep Scan</button>
    
    <div id="loader" class="loader"></div>
    <div id="status">System Ready...</div>
    <div id="result-box"></div>
</div>

<script>
    // 1. CONFIGURATION
    AWS.config.update({
        accessKeyId: 'AKIA2HEE4M2R5EEP7EUR', 
        secretAccessKey: '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',
        region: 'ap-south-1'
    });

    const s3 = new AWS.S3();
    const statusText = document.getElementById('status');
    const resultBox = document.getElementById('result-box');
    const loader = document.getElementById('loader');

    function updateFileName(input) {
        const display = document.getElementById('file-name-display');
        display.innerText = input.files[0] ? input.files[0].name : "Drop ZIP here or Click to Browse";
    }

    document.getElementById('upload-button').addEventListener('click', function() {
        const fileInput = document.getElementById('file-chooser');
        const file = fileInput.files[0];
        
        if (!file) {
            alert("Please select a file first!");
            return;
        }

        statusText.innerText = "[RUNNING] Uploading Encrypted Data...";
        loader.style.display = "block";
        resultBox.style.display = "none";

        const params = {
            Bucket: 'codelens-uploads-rishabh-2026',
            Key: file.name,
            ContentType: file.type,
            Body: file
        };

        s3.putObject(params, function(err, data) {
            if (err) {
                statusText.innerText = "❌ TERMINAL_ERROR: " + err.message;
                loader.style.display = "none";
            } else {
                statusText.innerText = "✅ UPLOAD_COMPLETE: Initializing AI Architect...";
                pollForResults(file.name);
            }
        });
    });

    function pollForResults(fileName) {
        const docClient = new AWS.DynamoDB.DocumentClient();
        const params = {
            TableName: "CodeLensResults",
            Key: { "fileName": fileName }
        };

        const interval = setInterval(() => {
            docClient.get(params, function(err, data) {
                if (err) {
                    console.log("DB_READ_RETRY...");
                } else if (data && data.Item) {
                    loader.style.display = "none";
                    statusText.innerText = "✨ SCAN_SUCCESS: Architecture Deciphered";
                    resultBox.style.display = "block";
                    
                    // Formatting the AI text to look cleaner
                    let formattedText = data.Item.analysis
                        .replace(/###/g, '\n■') // Replace headers with blocks
                        .replace(/\*\*/g, '')   // Remove markdown bold
                        .replace(/\|—/g, '  └─'); // Make the map lines prettier
                        
                    resultBox.innerHTML = `<span style="color:#38bdf8">> SOURCE: ${fileName}</span>\n<span style="color:#fbbf24">> TIMESTAMP: ${new Date().toLocaleTimeString()}</span>\n\n${formattedText}`;
                    
                    clearInterval(interval);
                }
            });
        }, 3000);

        setTimeout(() => {
            if(loader.style.display === "block") {
                clearInterval(interval);
                statusText.innerText = "❌ TIMEOUT: AI is taking too long.";
                loader.style.display = "none";
            }
        }, 60000); // 1 minute timeout for deep scans
    }
</script>

</body>
</html>
