<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeLens-AI | Smart Project Analysis</title>
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1.0.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; width: 400px; }
        h1 { color: #232f3e; margin-bottom: 1rem; }
        .upload-area { border: 2px dashed #0073bb; padding: 20px; border-radius: 8px; margin-bottom: 20px; cursor: pointer; }
        button { background: #ff9900; border: none; padding: 10px 20px; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; width: 100%; }
        button:hover { background: #e68a00; }
        #result-box { margin-top: 20px; padding: 15px; background: #e7f3ff; border-radius: 8px; display: none; text-align: left; border-left: 4px solid #0073bb; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; display: none; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h1>🔍 CodeLens-AI</h1>
    <p>Upload a file to see its AI purpose.</p>
    
    <div class="upload-area">
        <input type="file" id="file-chooser" />
    </div>
    
    <button id="upload-button">Analyze with Nova AI</button>
    
    <div id="loader" class="loader"></div>
    <div id="status">Waiting for file...</div>
    <div id="result-box"></div>
</div>

<script>
    // CONFIGURATION - Replace with your real keys
    AWS.config.update({
        accessKeyId: 'YOUR_ACCESS_KEY_ID', 
        secretAccessKey: 'YOUR_SECRET_ACCESS_KEY',
        region: 'ap-south-1'
    });

    const s3 = new AWS.S3();
    const docClient = new AWS.DynamoDB.DocumentClient();
    const status = document.getElementById('status');
    const resultBox = document.getElementById('result-box');
    const loader = document.getElementById('loader');

    document.getElementById('upload-button').addEventListener('click', function() {
        const file = document.getElementById('file-chooser').files[0];
        if (!file) return alert("Please select a file!");

        status.innerText = "Uploading to S3...";
        loader.style.display = "block";
        resultBox.style.display = "none";

        const params = {
            Bucket: 'codelens-uploads-rishabh-2026',
            Key: file.name,
            ContentType: file.type,
            Body: file
        };

        s3.putObject(params, function(err, data) {
            if (err) {
                status.innerText = "Upload Failed: " + err.message;
                loader.style.display = "none";
            } else {
                status.innerText = "✅ Uploaded! AI is thinking...";
                pollForResults(file.name);
            }
        });
    });

    function pollForResults(fileName) {
        const params = {
            TableName: "CodeLensResults",
            Key: { "fileName": fileName }
        };

        // Check DynamoDB every 3 seconds for the AI answer
        const interval = setInterval(() => {
            docClient.get(params, function(err, data) {
                if (!err && data.Item) {
                    loader.style.display = "none";
                    status.innerText = "Analysis Complete!";
                    resultBox.style.display = "block";
                    resultBox.innerHTML = `<strong>File:</strong> ${fileName}<br><br><strong>Purpose:</strong> ${data.Item.analysis}`;
                    clearInterval(interval);
                }
            });
        }, 3000);
    }
</script>

</body>
</html>
