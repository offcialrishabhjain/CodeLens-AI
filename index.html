<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeLens-AI | Smart Project Analysis</title>
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1610.0.min.js"></script>
    <style>
        /* Base Theme & Full Page Layout */
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #0b0f1a; margin: 0; display: flex; flex-direction: column; height: 100vh; color: #f8fafc; overflow: hidden; }
        
        /* Navigation Bar */
        .nav-bar { background: #1e293b; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
        .logo { font-size: 1.6rem; font-weight: 800; color: #38bdf8; display: flex; align-items: center; gap: 10px; }
        .header-accent { color: #fbbf24; }

        /* Main Workspace */
        .main-layout { display: flex; flex: 1; padding: 20px; gap: 20px; overflow: hidden; }
        
        /* Left Panel: Sidebar Controls */
        .control-panel { width: 350px; background: #1e293b; padding: 25px; border-radius: 15px; border: 1px solid #334155; display: flex; flex-direction: column; gap: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        /* Right Panel: Terminal Results */
        .display-panel { flex: 1; background: #000000; border-radius: 15px; border: 1px solid #059669; padding: 30px; overflow-y: auto; font-family: 'Fira Code', 'Courier New', monospace; position: relative; box-shadow: inset 0 0 20px rgba(0,0,0,1); }

        /* Form Styling */
        .input-group { text-align: left; }
        label { display: block; margin-bottom: 8px; font-size: 0.8rem; color: #94a3b8; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        select, .upload-zone { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #38bdf8; border-radius: 8px; color: white; cursor: pointer; box-sizing: border-box; font-size: 0.9rem; transition: 0.3s; }
        select:focus, .upload-zone:hover { border-color: #7dd3fc; outline: none; }
        
        button { background: #38bdf8; color: #0f172a; border: none; padding: 16px; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.3s; width: 100%; font-size: 1rem; text-transform: uppercase; margin-top: 10px; }
        button:hover { background: #7dd3fc; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(56, 189, 248, 0.4); }

        /* Analysis Card Styling */
        #status { font-weight: 600; color: #38bdf8; font-size: 0.85rem; }
        .feature-section { margin-top: 20px; padding: 15px; border-radius: 8px; background: rgba(255, 255, 255, 0.03); border-left: 4px solid #38bdf8; white-space: pre-wrap; line-height: 1.6; }
        .section-header { font-weight: bold; font-size: 1rem; margin-bottom: 10px; display: block; color: #fbbf24; text-transform: uppercase; letter-spacing: 1px; }

        /* Loader */
        .loader { border: 4px solid #334155; border-top: 4px solid #38bdf8; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 15px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <div class="logo">🔍 CodeLens<span class="header-accent">AI</span></div>
        <div id="status">System Online...</div>
    </div>

    <div class="main-layout">
        <div class="control-panel">
            <div class="input-group">
                <label>Experience Level</label>
                <select id="user-level">
                    <option value="Beginner">Beginner (Simple Analogies)</option>
                    <option value="Intermediate" selected>Intermediate (Modularity Focus)</option>
                    <option value="Advanced">Advanced (Scalability Focus)</option>
                </select>
            </div>

            <div class="input-group">
                <label>Project Repository</label>
                <div class="upload-zone" onclick="document.getElementById('file-chooser').click()">
                    <input type="file" id="file-chooser" style="display:none" onchange="updateFileName(this)"/>
                    <span id="file-name-display">Select ZIP Folder</span>
                </div>
            </div>

            <button id="upload-button">Execute Deep Audit</button>
            <div id="loader" class="loader"></div>
            
            <p style="font-size: 0.75rem; color: #64748b; line-height: 1.4; margin-top: auto;">
                Note: Analyzing all 8 features (Trace, Optimization, Mentor) may take 60-90 seconds.
            </p>
        </div>

        <div id="result-box" class="display-panel">
            <div style="color: #4ade80; text-align: center; margin-top: 15%; font-family: 'Segoe UI', sans-serif;">
                <span style="font-size: 2rem;">></span><br><br>
                CODELENS-AI KERNEL READY<br>
                <span style="color: #64748b; font-size: 0.9rem;">[ CHOOSE LEVEL & UPLOAD ZIP TO TRACE EXECUTION ]</span>
            </div>
        </div>
    </div>

<script>
    // 1. CONFIGURATION
    AWS.config.update({
        accessKeyId: 'AKIA2HEE4M2R5EEP7EUR', 
        secretAccessKey: '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',
        region: 'ap-south-1'
    });

    const s3 = new AWS.S3();
    const statusText = document.getElementById('status');
    const resultBox = document.getElementById('result-box');
    const loader = document.getElementById('loader');

    function updateFileName(input) {
        const display = document.getElementById('file-name-display');
        display.innerText = input.files[0] ? `Loaded: ${input.files[0].name}` : "Select ZIP Folder";
    }

    document.getElementById('upload-button').addEventListener('click', function() {
        const fileInput = document.getElementById('file-chooser');
        const file = fileInput.files[0];
        const level = document.getElementById('user-level').value;
        
        if (!file) {
            alert("Please select a file first!");
            return;
        }

        statusText.innerText = "[RUNNING] Uploading Data Stream...";
        loader.style.display = "block";
        resultBox.innerHTML = `<div style="color: #38bdf8; font-family: monospace;">> INITIALIZING DEEP SCAN...<br>> MODE: ${level.toUpperCase()}<br>> TARGET: ${file.name}</div>`;

        const params = {
            Bucket: 'codelens-uploads-rishabh-2026',
            Key: file.name,
            ContentType: file.type,
            Body: file,
            Metadata: { 'user-level': level }
        };

        s3.putObject(params, function(err, data) {
            if (err) {
                statusText.innerText = "❌ ERROR: " + err.message;
                loader.style.display = "none";
            } else {
                statusText.innerText = "✅ UPLOADED: Mapping Logic & Trace Flow...";
                pollForResults(file.name, level);
            }
        });
    });

    function pollForResults(fileName, userLevel) {
        const docClient = new AWS.DynamoDB.DocumentClient();
        const params = {
            TableName: "CodeLensResults",
            Key: { "fileName": fileName }
        };

        const interval = setInterval(() => {
            docClient.get(params, function(err, data) {
                if (err) {
                    console.log("WAITING...");
                } else if (data && data.Item) {
                    loader.style.display = "none";
                    statusText.innerText = "✨ ANALYSIS COMPLETE";
                    
                    // Regex mapping for all 8 requested features
                    let cleanText = data.Item.analysis
                        .replace(/### 1. Architecture Visualizer:/g, '<div class="feature-section" style="border-color:#10b981"><span class="section-header">🔍 1. Architecture Visualizer</span>')
                        .replace(/### 2. Automated Summarization:/g, '</div><div class="feature-section" style="border-color:#38bdf8"><span class="section-header">📝 2. Codebase Summarization</span>')
                        .replace(/### 3. Execution Trace Simulator:/g, '</div><div class="feature-section" style="border-color:#fbbf24"><span class="section-header">⚡ 3. Execution Trace Simulator</span>')
                        .replace(/### 4. Repo Optimization & Security:/g, '</div><div class="feature-section" style="border-color:#f43f5e"><span class="section-header">🛠️ 4. Repo Optimization & Security</span>')
                        .replace(/### 5. Repo Health Score:/g, '</div><div class="feature-section" style="border-color:#14b8a6"><span class="section-header">📊 5. Repo Health Score</span>')
                        .replace(/### 6. Interview & Viva Mentor:/g, '</div><div class="feature-section" style="border-color:#a855f7"><span class="section-header">👨‍🏫 6. Interview & Career Mentor</span>')
                        .replace(/###/g, '')
                        .replace(/\*\*/g, '')
                        .replace(/\|—/g, '  └─');

                    resultBox.innerHTML = `
                        <div style="border-bottom: 1px solid #334155; padding-bottom: 15px; margin-bottom: 20px; display:flex; justify-content:space-between; font-family: sans-serif;">
                            <span style="color:#38bdf8; font-weight:bold;">> SOURCE: ${fileName}</span>
                            <span style="color:#fbbf24; font-weight:bold;">> LEVEL: ${userLevel} Mode</span>
                        </div>
                        ${cleanText}</div>
                    `;
                    
                    clearInterval(interval);
                }
            });
        }, 3000);

        setTimeout(() => {
            if(loader.style.display === "block") {
                clearInterval(interval);
                statusText.innerText = "❌ TIMEOUT: Bedrock busy. Please Refresh.";
                loader.style.display = "none";
            }
        }, 95000); // 95s limit
    }
</script>

</body>
</html>
