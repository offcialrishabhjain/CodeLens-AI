<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeLens-AI | Deep Audit Dashboard</title>
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1610.0.min.js"></script>
    <style>
        /* Base Theme */
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: #f8fafc; }
        .container { background: #1e293b; padding: 2.5rem; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); text-align: center; width: 650px; border: 1px solid #334155; }
        
        h1 { color: #38bdf8; margin-bottom: 0.5rem; display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 2.2rem; }
        p { color: #94a3b8; margin-bottom: 2rem; }
        
        .upload-area { border: 2px dashed #38bdf8; padding: 40px; border-radius: 12px; margin-bottom: 20px; background: #0f172a; transition: 0.3s ease; cursor: pointer; }
        .upload-area:hover { border-color: #7dd3fc; background: #1e293b; }
        #file-name-display { color: #94a3b8; font-weight: 500; }

        button { background: #38bdf8; border: none; padding: 14px 20px; color: #0f172a; font-weight: 800; border-radius: 8px; cursor: pointer; width: 100%; font-size: 1.1rem; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { background: #7dd3fc; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(56, 189, 248, 0.4); }
        
        #status { margin-top: 20px; font-weight: 600; color: #38bdf8; font-size: 0.9rem; }

        /* Dashboard Result Container */
        #result-box { 
            margin-top: 25px; 
            padding: 25px; 
            background: #000000; 
            color: #f8fafc; 
            border-radius: 12px; 
            display: none; 
            text-align: left; 
            border: 1px solid #334155; 
            font-family: 'Fira Code', 'Courier New', monospace; 
            font-size: 0.85rem;
            line-height: 1.6;
            white-space: pre-wrap; 
            max-height: 600px;
            overflow-y: auto;
            animation: fadeIn 0.5s ease-in;
        }

        /* Color-Coded Feature Sections */
        .feature-section {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.03);
            border-left: 4px solid #38bdf8;
        }
        .section-header { font-weight: bold; font-size: 1rem; margin-bottom: 10px; display: block; }
        
        /* Specific Styles for Output Elements */
        .architecture { color: #10b981; } /* Green */
        .optimization { color: #fbbf24; } /* Yellow */
        .security { color: #ef4444; }     /* Red */
        .health { color: #38bdf8; }       /* Blue */
        .mentor { color: #a855f7; }       /* Purple */

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .loader { border: 4px solid #334155; border-top: 4px solid #38bdf8; border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; display: none; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .header-accent { color: #fbbf24; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔍 CodeLens<span class="header-accent">AI</span></h1>
    <p>Upload repository for Architecture & Security Audit.</p>
    
    <div class="upload-area" onclick="document.getElementById('file-chooser').click()">
        <input type="file" id="file-chooser" style="display:none" onchange="updateFileName(this)"/>
        <div id="file-name-display">Select ZIP Project Folder</div>
    </div>
    
    <button id="upload-button">Execute Deep Audit</button>
    
    <div id="loader" class="loader"></div>
    <div id="status">System Online...</div>
    <div id="result-box"></div>
</div>

<script>
    // 1. AWS CONFIGURATION
    AWS.config.update({
        accessKeyId: 'AKIA2HEE4M2R5EEP7EUR', 
        secretAccessKey: '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',
        region: 'ap-south-1'
    });

    const s3 = new AWS.S3();
    const statusText = document.getElementById('status');
    const resultBox = document.getElementById('result-box');
    const loader = document.getElementById('loader');

    function updateFileName(input) {
        const display = document.getElementById('file-name-display');
        display.innerText = input.files[0] ? `Ready: ${input.files[0].name}` : "Select ZIP Project Folder";
    }

    document.getElementById('upload-button').addEventListener('click', function() {
        const fileInput = document.getElementById('file-chooser');
        const file = fileInput.files[0];
        
        if (!file) {
            alert("Please select a file first!");
            return;
        }

        statusText.innerText = "[CORE_PROC] Uploading Data Stream...";
        loader.style.display = "block";
        resultBox.style.display = "none";

        const params = {
            Bucket: 'codelens-uploads-rishabh-2026',
            Key: file.name,
            ContentType: file.type,
            Body: file
        };

        s3.putObject(params, function(err, data) {
            if (err) {
                statusText.innerText = "❌ ERROR: " + err.message;
                loader.style.display = "none";
            } else {
                statusText.innerText = "✅ DATA_RECEIVED: Launching AI Audit...";
                pollForResults(file.name);
            }
        });
    });

    function pollForResults(fileName) {
        const docClient = new AWS.DynamoDB.DocumentClient();
        const params = {
            TableName: "CodeLensResults",
            Key: { "fileName": fileName }
        };

        const interval = setInterval(() => {
            docClient.get(params, function(err, data) {
                if (err) {
                    console.log("WAITING_FOR_DDB...");
                } else if (data && data.Item) {
                    loader.style.display = "none";
                    statusText.innerText = "✨ AUDIT_SUCCESS: Full Report Ready";
                    resultBox.style.display = "block";
                    
                    // Dashboard Logic: Split AI text into color-coded feature sections
                    let formattedText = data.Item.analysis
                        let formattedText = data.Item.analysis
    .replace(/1. Architecture Mind Map:/g,
        '<div class="feature-section architecture"><span class="section-header">🔍 Architecture Mind Map</span>')

    .replace(/2. File Breakdown:/g,
        '</div><div class="feature-section architecture"><span class="section-header">📂 File Breakdown</span>')

    .replace(/3. Logic Flow:/g,
        '</div><div class="feature-section architecture"><span class="section-header">⚙️ Logic Flow</span>')

    .replace(/4. Repo Optimization:/g,
        '</div><div class="feature-section optimization" style="border-color:#fbbf24"><span class="section-header">🛠 Repo Optimization</span>')

    .replace(/5. Repo Health Score:/g,
        '</div><div class="feature-section health" style="border-color:#38bdf8"><span class="section-header">📊 Repo Health Score</span>')

    .replace(/6. Interview Mentor:/g,
        '</div><div class="feature-section mentor" style="border-color:#a855f7"><span class="section-header">🎓 Interview Mentor</span>')

    .replace(/\*\*/g, '');
                    resultBox.innerHTML = `
<div style="color:#38bdf8; border-bottom:1px solid #334155; padding-bottom:10px; margin-bottom:15px;">
> ANALYSIS_REPORT: ${fileName} <br>
> TIMESTAMP: ${new Date().toLocaleTimeString()}
</div>
${formattedText}</div>`;
                    
                    clearInterval(interval);
                }
            });
        }, 3000);

        setTimeout(() => {
            if(loader.style.display === "block") {
                clearInterval(interval);
                statusText.innerText = "❌ TIMEOUT: Scan taking longer than expected.";
                loader.style.display = "none";
            }
        }, 60000);
    }
</script>

</body>
</html>
